server.port=8080

# DataSource Config
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Config
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# File Upload Configuration (max 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# File Storage Properties
app.upload.dir=./uploads/resumes

# JWT Properties
app.jwt.secret=YWlpaXJlYmFja2VuZGtleXNlY3JldHN0cm9uZ3NlY3VyZWtleTI1NmJpdHN0cmluZw==
# JWT expiration (7 days)
app.jwt.expiration-ms=604800000

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.aihire.backend=DEBUG

# OpenAPI / Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
